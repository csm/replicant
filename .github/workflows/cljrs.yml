name: cljrs

# Exercises Replicant's pure-data tests under the clojurust (cljrs) interpreter.
# These tests drive the renderer through the in-memory `replicant.mutation-log`
# fake (no DOM, no wasm), so they validate the `:rust` reader-conditional target
# -- reader conditionals, macro expansion, persistent collections and stdlib
# coverage -- independent of `cljrs.dom`. See doc/cljrs-port/STATUS.md.

on:
  # PRs cover the feature branches; pushing to a branch *and* opening a PR would
  # otherwise run this twice with separate (non-shared) cljrs binary caches.
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "examples/cljrs-wasm/**"
      - ".github/workflows/cljrs.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "examples/cljrs-wasm/**"
      - ".github/workflows/cljrs.yml"
  workflow_dispatch:

env:
  # cljrs >= 0.1.195 ships the cljrs.dom additions and the wasm CLI; 0.1.196 adds
  # reader metadata on ns/def names; 0.1.197 adds auto-gensym (symbol#); 0.1.198
  # adds defmacro-name metadata + the map-literal reader fix; 0.1.199 adds the
  # `declare` macro. 0.1.200 adds map-entry?; 0.1.201 adds dynamic-var binding;
  # 0.1.203 adds extend-via-metadata protocol dispatch + some->> + run!.
  # 0.1.204 fixes cross namespace extend-via-metadata
  # 0.1.207 fixes map entry types, metadata for empty, and deref sugar in anonymous functions
  # 0.1.210 intends to fix IR mis-lowering, into with metadata, and keys
  # destructuring for namespaced keys. Verified locally: `into`-with-metadata and
  # namespaced :keys destructuring ARE fixed (probes 36b/36c pass; the
  # --ir-threshold-high suites go from 206/235 passing (18 errors) at 0.1.207 to
  # 221/235 (1 error) here). BUT the IR mis-lowering itself is NOT fixed at
  # default settings -- probe 36a still fails from iteration ~10 onward, and the
  # default-settings suites are still ~211 errors, same as before 0.1.210. The
  # diagnostic --ir-threshold step below remains necessary.
  # 0.1.211 fixes cross namespace macro generated functions in IR lowerer.
  # Verified locally: the "not callable" corruption is genuinely fixed (5+
  # repeated runs of examples/cljrs-wasm/probes/ir-lowering-standalone-repro/
  # and probe 37 all pass). BUT default-settings suites are still ~211 errors,
  # because the same underlying IR-tier promotion defect now surfaces as NEW
  # symptoms instead: silent string corruption (`(str x nil)` returns "xnil"
  # once its wrapping fn is called ~50+ times -- probe 38, zero dependencies,
  # not even a macro) and non-deterministic process crashes (graceful panic or
  # SIGSEGV) under the full core-test suite. Both are eliminated by
  # --ir-threshold, same as before. See STATUS.md "0.1.211" for the full
  # writeup. The diagnostic --ir-threshold step below remains necessary.
  # 0.1.212 fixes nil handling for str under IR lowering. Verified locally:
  # probe 38 (str-nil corruption) now passes cleanly across 3 repeated runs, no
  # regression on bug 5's repros. BUT the crash (bug 8) persists -- 4 of 5 runs
  # of `cljrs test ... replicant.core-test` still crash (SIGSEGV or a graceful
  # panic, varying by run), still eliminated by --ir-threshold. Found the exact
  # panic via RUST_BACKTRACE=full: `rpds-1.2.1/src/vector/mod.rs:134: index out
  # of bounds: the len is 2 but the index is 8` -- index 8 is the `text` slot
  # in Replicant's 9-element hiccup-headers tuple, so a vector that should have
  # 9 elements intermittently gets built with only 2 once promoted. Confirmed
  # same defect family (not a new 5th bug): with --ir-threshold disabled, the
  # exact test that produces this crash only shows the already-known benign
  # assertion failure. See STATUS.md "0.1.212" for the full writeup, including
  # an unsuccessful minimization attempt (a bare conj-chain builder does not
  # reproduce it -- the trigger needs more of the real reconcile machinery).
  # 0.1.213 fixes a use-after-free bug when conj!/assoc! is IR lowered/region
  # optimized -- confirmed: the bug 8 crash (rpds vector index-out-of-bounds
  # panic) is gone, 5/5 clean runs. BUT a 4th symptom of the same defect
  # family remains: core-test at default settings still shows ~55-70
  # failures vs. the --ir-threshold-disabled baseline of 13 (always 1 error,
  # never a crash, on either side). Every extra failure is an existing,
  # already-rendered node's text/children silently reading back as "" on a
  # later mutation-log event, even though that node's content didn't change
  # in the render that produced the event -- e.g. re-rendering
  # [:h1 {:lang "en"} "Hello world"] with only the attribute changed logs
  # [:set-attribute [:h1 ""] ...] instead of [:set-attribute [:h1 "Hello
  # world"] ...]. Minimized to a single repeated scenario (no cross-namespace
  # macro needed this time), deterministic at exactly call 150 across 2 runs:
  # examples/cljrs-wasm/probes/39_stale_children_after_promotion.cljrs. Looks
  # like 0.1.213 fixed the memory-safety half of bug 8 (no more out-of-bounds
  # panics) but not the data-integrity half (the collection can still
  # silently end up empty under promotion). See STATUS.md "0.1.213" for the
  # full writeup, including the negative results from smaller isolation
  # attempts (transient/conj! accumulator loop, test-helper's get-text-nodes
  # alone). The diagnostic --ir-threshold step below remains necessary.
  # 0.1.214 fixes two additional region optimization bugs with get and
  # ambiguous function calls
  # Bump this (the cache key picks it up automatically) to track newer releases.
  CLJRS_VERSION: "0.1.214"

jobs:
  pure-data-tests:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cljrs binary
        id: cache-cljrs
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cljrs
          key: cljrs-${{ runner.os }}-${{ runner.arch }}-${{ env.CLJRS_VERSION }}

      - name: Install cljrs
        if: steps.cache-cljrs.outputs.cache-hit != 'true'
        run: cargo install cljrs --version "=${{ env.CLJRS_VERSION }}"

      - name: Version
        run: cljrs --version

      - name: Run pure-data tests (gate)
        # Suites that load and pass under cljrs today. transition-test is
        # unblocked as of cljrs 0.1.196 (ns metadata) plus the :rust string-interop
        # branch in transition.cljc. As more reader fixes land, promote the
        # namespaces from the blocked step below.
        run: |
          cljrs test \
            --src-path src \
            --src-path test \
            replicant.hiccup-test \
            replicant.transition-test

      - name: Run pure-data tests blocked on cljrs runtime gaps (informational)
        # Remaining runtime cljrs gaps tracked in doc/cljrs-port/STATUS.md.
        # Tolerant: promotes to the gate once they pass.
        run: |
          cljrs test \
            --src-path src \
            --src-path test \
            replicant.alias-test \
            replicant.string-test \
            replicant.core-test || echo "(still blocked on cljrs runtime gaps -- see STATUS.md)"

      - name: Same suites with Tier-1 IR lowering disabled (diagnostic)
        # DIAGNOSTIC, not a workaround: cljrs's Tier-1 IR-tier promotion pass has
        # a defect that has surfaced under several symptoms across versions --
        # "not callable" (fixed 0.1.211), silent string corruption (probe 38),
        # and non-deterministic crashes (graceful panic or SIGSEGV) -- all tied
        # to functions called ~50+ times. Running with --ir-threshold set high
        # isolates the remaining genuine issues from all of that: ~221/235
        # assertions pass here vs ~19 with the default tiers (0.1.211). Remove
        # once the IR tier's promotion/re-lowering defect is fixed at the root
        # upstream (see doc/cljrs-port/STATUS.md).
        run: |
          cljrs --ir-threshold 100000000 test \
            --src-path src \
            --src-path test \
            replicant.alias-test \
            replicant.string-test \
            replicant.core-test || echo "(remaining non-tier issues -- see STATUS.md)"

      - name: cljrs reader/feature probes (diagnostic)
        # Runs LAST so the PASS/FAIL matrix lands at the tail of the log (it was
        # previously buried behind the test output). Each probe isolates one
        # language/reader/runtime feature the port relies on, so a failure points
        # at a precise cljrs deficiency. Tolerant: always exits 0.
        if: always()
        run: |
          echo "cljrs feature matrix:"
          for f in examples/cljrs-wasm/probes/*.cljrs; do
            # src/test on the path so require-based probes can resolve replicant.*
            # Truncate output to one 300-char line so a failing probe's (sometimes
            # pathologically nested/escaped) error blob can't swamp the matrix.
            if out=$(cljrs run --src-path src --src-path test "$f" 2>&1); then
              echo "PASS  $(basename "$f")  -> $(printf '%s' "$out" | tr '\n' ' ' | cut -c1-300)"
            else
              echo "FAIL  $(basename "$f")  -> $(printf '%s' "$out" | tr '\n' ' ' | cut -c1-300)"
            fi
          done
          exit 0
