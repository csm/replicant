name: cljrs

# Exercises Replicant's pure-data tests under the clojurust (cljrs) interpreter.
# These tests drive the renderer through the in-memory `replicant.mutation-log`
# fake (no DOM, no wasm), so they validate the `:rust` reader-conditional target
# -- reader conditionals, macro expansion, persistent collections and stdlib
# coverage -- independent of `cljrs.dom`. See doc/cljrs-port/STATUS.md.

on:
  # PRs cover the feature branches; pushing to a branch *and* opening a PR would
  # otherwise run this twice with separate (non-shared) cljrs binary caches.
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "test/**"
      - "examples/cljrs-wasm/**"
      - ".github/workflows/cljrs.yml"
  pull_request:
    paths:
      - "src/**"
      - "test/**"
      - "examples/cljrs-wasm/**"
      - ".github/workflows/cljrs.yml"
  workflow_dispatch:

env:
  # cljrs >= 0.1.195 ships the cljrs.dom additions and the wasm CLI. Bump this
  # (and the cache key picks it up automatically) to track newer releases.
  CLJRS_VERSION: "0.1.195"

jobs:
  pure-data-tests:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cljrs binary
        id: cache-cljrs
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cljrs
          key: cljrs-${{ runner.os }}-${{ runner.arch }}-${{ env.CLJRS_VERSION }}

      - name: Install cljrs
        if: steps.cache-cljrs.outputs.cache-hit != 'true'
        run: cargo install cljrs --version "=${{ env.CLJRS_VERSION }}"

      - name: Version
        run: cljrs --version

      - name: cljrs reader/feature probes (diagnostic)
        # Each probe isolates one language/reader feature the port relies on, so
        # a failure points at a precise cljrs deficiency to flag upstream (rather
        # than a terse, masked read error from the full test load). Tolerant:
        # this step always succeeds; it just prints a PASS/FAIL matrix.
        run: |
          echo "cljrs feature matrix:"
          rc=0
          for f in examples/cljrs-wasm/probes/*.cljrs; do
            if out=$(cljrs run "$f" 2>&1); then
              echo "PASS  $(basename "$f")  -> $out"
            else
              echo "FAIL  $(basename "$f")  -> $out"
            fi
          done
          exit 0

      - name: Run pure-data tests (gate)
        # Suites that load and pass under cljrs today. As upstream cljrs reader
        # fixes land (see the blocked step below), move namespaces up here.
        run: |
          cljrs test \
            --src-path src \
            --src-path test \
            replicant.hiccup-test

      - name: Run pure-data tests blocked on cljrs reader fixes (informational)
        # These fail to LOAD due to two confirmed cljrs reader gaps (see the
        # feature matrix above and doc/cljrs-port/STATUS.md):
        #   1. reader metadata on ns/def names (e.g. (ns ^:no-doc ...))
        #   2. auto-gensym symbol# in syntax-quote (e.g. `(let [x# 1] x#))
        # Tolerant on purpose: surfaces the current error each run and flips to a
        # real signal once cljrs can read these namespaces.
        run: |
          cljrs test \
            --src-path src \
            --src-path test \
            replicant.transition-test \
            replicant.alias-test \
            replicant.string-test \
            replicant.core-test || echo "(still blocked on cljrs reader fixes)"
