<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Replicant on cljrs/wasm</title>
  </head>
  <body>
    <div id="app"></div>

    <!--
      Loader for the cljrs-built wasm module. The exact glue (wasm-bindgen JS
      shim name, init signature, exported entry) depends on how `cljrs` packages
      the module in the version you build with; adjust the import below to match.
    -->
    <script type="module">
      import init, { main } from "./demo.js";
      await init();
      main();
    </script>
  </body>
</html>
